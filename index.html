<!DOCTYPE html>
<html>
<head>

<title>Decision Game</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;

  display: flex;
  justify-content: center;   
  align-items: center;      

  min-height: 100dvh;  

  flex-direction: column;

  padding: 20px;

  background-size: cover;
  background-position: center;
  
}
  
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-size: cover;
  background-position: center;

  transition: opacity 1s ease;
  z-index: -1;

  opacity: 0;
}

.bg.active {
  opacity: 1;
}

.container {
  width: 100%;
  max-width: 500px;
  text-align: center;

  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);

  padding: 20px;
  border-radius: 16px;

  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

#story {
  margin: 20px 0;
  font-size: 1.2rem;

  line-height: 1.6;
  text-align: left;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 1rem;
  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;

  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}

button:hover {
  opacity: 0.9;
}

button:active {
  transform: scale(0.97);
}

.hidden {
  display: none;
}

#analysis {
  margin-top: 20px;
  text-align: left;
  font-size: 0.95rem;
}
</style>
</head>

// EXPLANATIONS PER DECISION NUMBER
const explanations = [
  {
    L: "Choice 1 (L): Acting quickly reflects urgency and possible loss aversion.",
    R: "Choice 1 (R): Taking time shows planning and need for control."
  },
  {
    L: "Choice 2 (L): Helping reflects prosocial behavior and empathy.",
    R: "Choice 2 (R): Ignoring reflects goal-prioritization under pressure."
  }
];

let current = "start";
let history = [];

// BACKGROUND
let currentBg = 1;

function changeBackground(imageUrl) {
  const bg1 = document.getElementById("bg1");
  const bg2 = document.getElementById("bg2");

  const next = currentBg === 1 ? bg2 : bg1;
  const current = currentBg === 1 ? bg1 : bg2;

  next.style.backgroundImage =
    `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(${imageUrl})`;

  next.classList.add("active");
  current.classList.remove("active");

  currentBg = currentBg === 1 ? 2 : 1;
}

// TYPING
function typeText(text, elementId, speed = 25) {
  const el = document.getElementById(elementId);
  el.textContent = "";

  const btn1 = document.getElementById("choice1");
  const btn2 = document.getElementById("choice2");

  btn1.disabled = true;
  btn2.disabled = true;

  clearTimeout(typingTimeout);

  let i = 0;

  function typing() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      typingTimeout = setTimeout(typing, speed);
    } else {
      btn1.disabled = false;
      btn2.disabled = false;
    }
  }

  typing();
}

// START
function startGame() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  changeBackground(story.start.bg);
  loadNode("start");
}

// LOAD NODE
function loadNode(key) {
  const node = story[key];

   typeText(node.text, "story");

  if (node.bg) {
  changeBackground(node.bg);
  }

  document.getElementById("choice1").innerText = node.choices[0].text;
  document.getElementById("choice2").innerText = node.choices[1].text;

  document.getElementById("choice1").onclick = () => choose(node.choices[0]);
  document.getElementById("choice2").onclick = () => choose(node.choices[1]);
}

// CHOICE
function choose(choice) {
  history.push(choice.label);

  const nextNode = story[choice.next];

  if (nextNode.ending) {
    showEnding(nextNode.text, nextNode.bg);
  } else {
    loadNode(choice.next);
}
}

// SHOW ENDING
function showEnding(text, bg) {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");
  
  if (bg) changeBackground(bg);
  
  typeText(text, "endingText");
}

// SHOW ANALYSIS
function showAnalysis() {
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("analysisScreen").classList.remove("hidden");

  const box = document.getElementById("analysis");
  box.innerHTML = "";

  history.forEach((choice, index) => {
    const p = document.createElement("p");
    p.innerText = explanations[index][choice];
    box.appendChild(p);
  });
}
