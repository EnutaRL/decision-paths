<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Game</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

.container {
  width: 100%;
  max-width: 500px;
  text-align: center;

  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);

  padding: 20px;
  border-radius: 16px;

  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

#story {
  margin: 20px 0;
  font-size: 1.2rem;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 1rem;
  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;

  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}

button:hover {
  opacity: 0.9;
}

button:active {
  transform: scale(0.97);
}

.hidden {
  display: none;
}

#analysis {
  margin-top: 20px;
  text-align: left;
  font-size: 0.95rem;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="startScreen">
  <h1>Decision Paths</h1>
  <button onclick="startGame()">Play</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="hidden">
  <p id="story"></p>
  <button id="choice1"></button>
  <button id="choice2"></button>
</div>

<!-- ENDING -->
<div id="endScreen" class="hidden">
  <p id="endingText"></p>
  <button onclick="showAnalysis()">Continue</button>
</div>

<!-- ANALYSIS -->
<div id="analysisScreen" class="hidden">
  <h2>Your Decisions</h2>
  <div id="analysis"></div>
  <button onclick="location.reload()">Fin.</button>
</div>

</div>

<script>

// STORY
const story = {

  start: {
    text: "You wake up late. What do you do?",
    choices: [
      { text: "Rush out immediately", next: "node1", label: "A" },
      { text: "Take time to organize", next: "node2", label: "B" }
    ]
  },

  node1: {
    text: "You see someone drop their bag while you rush.",
    choices: [
      { text: "Help them", next: "end1", label: "A" },
      { text: "Ignore and keep going", next: "end2", label: "B" }
    ]
  },

  node2: {
    text: "You feel calm. A friend texts you.",
    choices: [
      { text: "Reply", next: "end3", label: "A" },
      { text: "Ignore", next: "end4", label: "B" }
    ]
  },

  // ENDINGS (CUSTOMIZABLE STORY CONCLUSION)
  end1: {
    text: "You arrive late, but helped someone along the way.",
    ending: true
  },

  end2: {
    text: "You arrive on time, but something feels off.",
    ending: true
  },

  end3: {
    text: "You maintain connections but risk being late.",
    ending: true
  },

  end4: {
    text: "You stay focused and arrive prepared.",
    ending: true
  }
};


// EXPLANATIONS PER DECISION NUMBER
const explanations = [
  {
    A: "Choice 1 (A): Acting quickly reflects urgency and possible loss aversion.",
    B: "Choice 1 (B): Taking time shows planning and need for control."
  },
  {
    A: "Choice 2 (A): Helping reflects prosocial behavior and empathy.",
    B: "Choice 2 (B): Ignoring reflects goal-prioritization under pressure."
  }
];

let current = "start";
let history = [];

// START
function startGame() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  loadNode(current);
}

// LOAD NODE
function loadNode(key) {
  const node = story[key];

  document.getElementById("story").innerText = node.text;

  document.getElementById("choice1").innerText = node.choices[0].text;
  document.getElementById("choice2").innerText = node.choices[1].text;

  document.getElementById("choice1").onclick = () => choose(node.choices[0]);
  document.getElementById("choice2").onclick = () => choose(node.choices[1]);
}

// CHOICE
function choose(choice) {
  history.push(choice.label);

  const nextNode = story[choice.next];

  if (nextNode.ending) {
    showEnding(nextNode.text);
  } else {
    loadNode(choice.next);
  }
}

// SHOW ENDING
function showEnding(text) {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");
  document.getElementById("endingText").innerText = text;
}

// SHOW ANALYSIS
function showAnalysis() {
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("analysisScreen").classList.remove("hidden");

  const box = document.getElementById("analysis");
  box.innerHTML = "";

  history.forEach((choice, index) => {
    const p = document.createElement("p");
    p.innerText = explanations[index][choice];
    box.appendChild(p);
  });
}

</script>

</body>
</html>
