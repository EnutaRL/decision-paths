<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Game</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;

  display: flex;
  justify-content: center;   
  align-items: center;      

  min-height: 100dvh;  

  flex-direction: column;

  padding: 20px;

  background-size: cover;
  background-position: center;
  
}
  
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-size: cover;
  background-position: center;

  transition: opacity 1s ease;
  z-index: -1;

  opacity: 0;
}

.bg.active {
  opacity: 1;
}

.container {
  width: 100%;
  max-width: 750px;
  text-align: center;

  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);

  padding: 20px;
  border-radius: 16px;

  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

#story {
  margin: 18px 0;
  font-size: 0.95rem;

  line-height: 1.6;
  text-align: left;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 0.95rem;
  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;

  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}

button:hover {
  opacity: 0.9;
}

button:active {
  transform: scale(0.97);
}

.hidden {
  display: none;
}

#analysis {
  margin-top: 20px;
  text-align: left;
  font-size: 0.90rem;
}
</style>
</head>

<body>

<div id="bg1" class="bg active"></div>
<div id="bg2" class="bg"></div>

<div class="container">

<!-- START -->
<div id="startScreen">
  <h1>Guided Minds: The Psychology of Decision</h1>
  <button onclick="startGame()">Play</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="hidden">
  <p id="story"></p>
  <button id="choice1"></button>
  <button id="choice2"></button>
</div>

<!-- ENDING -->
<div id="endScreen" class="hidden">
  <p id="endingText"></p>
  <button onclick="showAnalysis()">Fin</button>
</div>

<!-- ANALYSIS -->
<div id="analysisScreen" class="hidden">
  <h2>Your Decisions</h2>
  <div id="analysis"></div>
  <button onclick="location.reload()">Replay.</button>
</div>

</div>

	bg: "https://i0.wp.com/jameystegmaier.com/wp-content/uploads/2022/05/school.png?fit=1024%2C538&ssl=1", //raising hand

  node3: {

  node4: {

    choices: [

    text: "After his last class, Iris returns home. When opening the door of his house, his dad welcomes him, giving him a quick glance before looking back at the TV. The news reporter is announces that British Columbia has abandoned daylight savings time. How exciting. Back from her trip in Taiwan, his mum has brought back a gift for him: a necklace with a smiling fat buddah made of jade hanging. This is not very much in his style, but his mother is showing a radiant smile.",
	bg: "https://www.baikalla.com/cdn/shop/files/Newjade050624-27163.jpg?v=1715126593&width=2000", //buddah necklace
    choices: [
      { text: "Kindly refuse it", next: "end1", label: "L" },
      { text: "Take it and wear it only on some rare family occasions", next: "end2", label: "R" }
    ]
  },
  
  node7: {
    text: "After running away for what felt like seconds, Iris arrives at the edge of a huge forest. Behind him is a dingy dirt road where the cat bus passes every 15 minutes or so. He knows he is being chased by the fearsome Big Roach with its weapon the Big Shot. He could run away now and put some distance between them, or the cat bus could show up at the horizon line any minute now.",
	bg: "https://static.vecteezy.com/system/resources/previews/071/134/784/non_2x/an-old-bus-stop-with-a-map-on-the-ground-free-photo.jpg", //forest bus stop

	bg: "https://res.cloudinary.com/aenetworks/image/upload/c_fill,ar_2,w_3840,h_1920,g_auto/dpr_auto/f_auto/q_auto:eco/v1/the-sphinx-gettyimages-1183584133?_a=BAVMn6DY0", //sphynx
    choices: [
      { text: "Avert the eyes, the cogwork inside the head must appear to spin with difficulty, deep in thought", next: "node9", label: "L" },

	bg: "https://corvusjanitorial.com/wp-content/uploads/2021/01/Janitor.jpg", //janitor

  node11: {
    text: "Did that work? Iris is too unexperienced to know if anything he said had any real impact, but the janitor calmed down and walked away. Anyways, class should start soon but the clock is broken so time won't make it to when class starts, how lucky.",
	bg: "https://generationaldesign.ca/cdn/shop/files/2518C94B-01D9-4B10-ACCA-CE2EBEF816FE_2048x.jpg?v=1768615883", //clock
    choices: [
      { text: "Laze around, relax and do not think about school", next: "node12", label: "L" },
      { text: "Free time means study time", next: "node12", label: "R" }
    ]
  },
  
    node12: {
    text: "While time is paused, Iris get offered an ornament by the librarian. It is a ring wich emits the same blaring siren which he has heard earlier. Apparently, everyone in the city owns one of these. It is certainly not to Iris' taste and the sound is offputting to say the least, but she insists.",
	bg: "https://cdn.shopify.com/s/files/1/1079/0384/files/1_152477e9-93da-46da-b30e-8c1e59e05d7b_2048x2048.jpg?v=1753385428", //ring
    choices: [
      { text: "Kindly refuse it", next: "end3", label: "L" },

  // ENDINGS
  end1: {
    text: "Mum looks at Iris with an unchanging expression, putting away the gift while asking him about his day. Nothing much he says. Nothing is good she says. After a nice dinner, Iris drifts off into the world of dreams once again.",
	bg: "https://cdn.zmescience.com/wp-content/uploads/2025/04/1440_lucid_dreaming-feat_flip.jpg", //dreaming
    ending: true
  },

  end2: {
    text: "He puts the necklace in a box, one to be forgotten and found years later when moving away. While appreciating the sentiment, he simply does not feel the cultural connection having lived in Canada his whole life. Lazily, he rests on his bed for what he believes to be 15 minutes, but will last until the next morning.",

    ending: true

// EXPLANATIONS PER DECISION NUMBER
const explanations = [
  {
    L: "Choice 1 (L): Information seeking bias. This is an intrinsic instinct to learn more about the environment. Good job!",
    R: "Choice 1 (R): Avoidance coping. The reaction to avoid stressors like the siren when confronted. While it offers short form release, it often harms in the long run."
  },
  {
    L: "Choice 2 (L): Risk aversion. By choosing to run, the safer option is guaranteed, but the potential confort of the bus is abandoned.",
    R: "Choice 2 (R): Status quo bias. Since this was the first choice set, waiting for the bus feels right. Obviously, there is also bias from not wanting to sweat in clean clothes."
  },
  {
    L: "Choice 3 (L): Evaluation apprehension. A fear of being judged, instigated by phrases like 'Better appear a fool then open your mouth and remove all doubt'. Truth is, the reaction is only constructed by one's own imagination.",
    R: "Choice 3 (R): Growth mindset. By at least trying to answer, Iris' academic growth was prioritized. Embracing challenges is a big part of this theory."
  },
  {
    L: "Choice 4 (L): Cognitive reappraisal. By filtering emotions out of the equation, the mind reevaluates the situation. This can help during heights of emotion, like the conversation Iris has.",
    R: "Choice 4 (R): Ego defense. The defenses are unconscious mechanisms to protect against unwanted feelings. Here, they take the form of an aggressive tone."
  },
  {
    L: "Choice 5 (L): Emotional cushioning. By focusing on the positive, it might help someone temporarily. However, avoiding the discomfort of truth and pain can be harmful to the growth of a person.",
    R: "Choice 5 (R): Problem-focused coping. Tackling the problem head on is the preferred method of most professionals. Confronting trauma is the only way to cleanly resolve them. This then aids the healing process of acceptance down the path."
  },
  {
    L: "Choice 6 (L): Present bias. The closer immediate relaxation is prioritized over the further knowledge. Thinking in the long run is neglected.",
    R: "Choice 6 (R): Delayed gratification. Even if studying for a future test does not help the present, the future person sitting in front of an exam paper will feel grateful for the hard work of past self."
  },
  {
    L: "Choice 7 (L): Authenticity bias. This is the desire to be true to oneself. While generally good, it can also morph into a shell which blocks all outside opinions, therefore balance is key.",
    R: "Choice 7 (R): Normative social influence. By wanting to please and fit in, the jewelry is accepted as gift, even if Iris disagrees with it"
  },
];

let current = "start";
let history = [];

// BACKGROUND
let currentBg = 1;

function changeBackground(imageUrl) {
  const bg1 = document.getElementById("bg1");
  const bg2 = document.getElementById("bg2");

  const next = currentBg === 1 ? bg2 : bg1;
  const current = currentBg === 1 ? bg1 : bg2;

  next.style.backgroundImage =
    `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(${imageUrl})`;

  next.classList.add("active");
  current.classList.remove("active");

  currentBg = currentBg === 1 ? 2 : 1;
}

// TYPING
function typeText(text, elementId, speed = 8) {
  const el = document.getElementById(elementId);
  el.textContent = "";

  const btn1 = document.getElementById("choice1");
  const btn2 = document.getElementById("choice2");

  btn1.disabled = true;
  btn2.disabled = true;

  clearTimeout(typingTimeout);

  let i = 0;

  function typing() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      typingTimeout = setTimeout(typing, speed);
    } else {
      btn1.disabled = false;
      btn2.disabled = false;
    }
  }

  typing();
}

// START
function startGame() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  changeBackground(story.start.bg);
  loadNode("start");
}

// LOAD NODE
function loadNode(key) {
  const node = story[key];

   typeText(node.text, "story");

  if (node.bg) {
  changeBackground(node.bg);
  }

  document.getElementById("choice1").innerText = node.choices[0].text;
  document.getElementById("choice2").innerText = node.choices[1].text;

  document.getElementById("choice1").onclick = () => choose(node.choices[0]);
  document.getElementById("choice2").onclick = () => choose(node.choices[1]);
}

// CHOICE
function choose(choice) {
  history.push(choice.label);

  const nextNode = story[choice.next];

  if (nextNode.ending) {
    showEnding(nextNode.text, nextNode.bg);
  } else {
    loadNode(choice.next);
}
}

// SHOW ENDING
function showEnding(text, bg) {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");
  
  if (bg) changeBackground(bg);
  
  typeText(text, "endingText");
}

// SHOW ANALYSIS
function showAnalysis() {
  document.getElementById("endScreen").classList.add("hidden");
  document.getElementById("analysisScreen").classList.remove("hidden");

  const box = document.getElementById("analysis");
  box.innerHTML = "";

  history.forEach((choice, index) => {
    const p = document.createElement("p");
    p.innerText = explanations[index][choice];
    box.appendChild(p);
  });
}


</script>

</body>
</html>
