const explanations = {
  fundamental: "Fundamental Attribution Error: assuming someone's behavior reflects personality instead of situation.",
  situational: "Situational Attribution: considering external factors influencing behavior.",
  avoidance: "Avoidance Behavior: avoiding situations that may produce anxiety.",
  approach: "Approach Behavior: moving toward potentially rewarding social situations.",
  initiative: "Social Initiative: taking action to interact increases positive reinforcement.",
  risk_aversion: "Risk Aversion: avoiding uncertain outcomes."
};

let currentNode = "start";
let playerTags = [];

function loadNode(nodeId) {
  const node = storyData[nodeId];

  document.getElementById("story").innerText = node.text;

  document.getElementById("choice1").innerText = node.choices[0].text;
  document.getElementById("choice2").innerText = node.choices[1].text;

  document.getElementById("choice1").onclick = () => handleChoice(node.choices[0]);
  document.getElementById("choice2").onclick = () => handleChoice(node.choices[1]);
}

function handleChoice(choice) {

  playerTags.push(choice.tag);

  if (choice.next === "end") {
    showResults();
  } else {
    loadNode(choice.next);
  }
}

function showResults() {

  document.getElementById("story").innerText = "Psychological Summary of Your Decisions";

  document.getElementById("choice1").style.display = "none";
  document.getElementById("choice2").style.display = "none";

  const explanationBox = document.getElementById("explanation");

  explanationBox.innerHTML = "";

  const uniqueTags = [...new Set(playerTags)];

  uniqueTags.forEach(tag => {
    const p = document.createElement("p");
    p.innerText = explanations[tag];
    explanationBox.appendChild(p);
  });
}
